services:
  - type: web
    name: whatsapp-baileys-api
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install --prefix .
    startCommand: npm start --prefix .
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: AUTO_CONNECT
        value: "false"
